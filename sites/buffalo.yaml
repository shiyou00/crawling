# Buffalo University - 新闻发布
name: "Buffalo University"
enabled: true
type: html

html:
  url: "https://www.buffalo.edu/news/news-releases.html"
  link_prefix: "https:"
  selectors:
    container: "div.teaser-full.newspage"
    title: "div.teaser-title span"
    link: "a.teaser-primary-anchor"
  date:
    selector: "span.teaser-date"
    format: "%m/%d/%y"

content:
  selector: "div.text.parbase.section"
  paragraph_selector: "p"
