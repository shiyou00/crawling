# ANL - Argonne National Laboratory Press Releases
name: "ANL"
enabled: true
type: html

# HTML 采集配置
html:
  url: "https://www.anl.gov/press-releases"
  link_prefix: "https://www.anl.gov"
  selectors:
    container: "article.teaser"
    title: "h3.teaser__title a span"
    link: "h3.teaser__title a"
    summary: "div.teaser__desc div"
  date:
    selector: "div.teaser__meta span"
    format: "%B %d, %Y"

# 文章内容选择器
content:
  selector: "article, .field--name-body, .node__content"
  paragraph_selector: "p"
