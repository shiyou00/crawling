# ANL In the News - Argonne National Laboratory 媒体报道
name: "ANL Media"
enabled: true
type: html

# HTML 采集配置
html:
  url: "https://www.anl.gov/in-the-news"
  link_prefix: "https://www.anl.gov"
  selectors:
    container: "article.teaser"
    title: "h3.teaser__title a span"
    link: "h3.teaser__title a"
    summary: "div.teaser__desc div"
  date:
    selector: "div.teaser__meta span"
    format: "%B %d, %Y"

# 文章内容选择器（In the News 链接多为外部媒体，使用通用选择器）
content:
  selector: "article, .node__content, .field--name-body"
  paragraph_selector: "p"
